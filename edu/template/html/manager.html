<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Template Manager</title>
    <style>
        html { box-sizing: border-box; }
        *, *:before, *:after { box-sizing: inherit; }
        body { margin: 0; height: 100vh; width: 100vw; font-family: sans-serif; display: flex; overflow: hidden; background: #ecf0f1; }
        
        .sidebar { width: 320px; min-width: 320px; background: #2c3e50; color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; }
        .sidebar header { padding: 20px; background: #1a252f; border-bottom: 2px solid #e74c3c; }
        .sidebar h2 { margin: 0 0 15px 0; font-size: 18px; }
        .search-box { width: 100%; padding: 10px; border: none; border-radius: 4px; outline: none; background: #34495e; color: #fff; font-size: 14px; }
        .search-box::placeholder { color: #95a5a6; }
        
        .tree-container { flex: 1; overflow-y: auto; padding: 10px 0; }
        ul.tree-root, ul.children { list-style: none; padding: 0; margin: 0; }
        ul.children { padding-left: 15px; border-left: 1px dashed #34495e; margin-left: 10px; }
        
        .tree-node { margin-bottom: 2px; }
        .node-content { display: flex; align-items: center; padding: 8px 15px; cursor: pointer; transition: background 0.2s; position: relative; }
        .node-content:hover { background: #34495e; }
        .node-content.drag-over { background: #e74c3c !important; border: 1px solid #fff; }
        .node-content.drag-above { border-top: 2px solid #e74c3c; }
        .node-content.drag-below { border-bottom: 2px solid #e74c3c; }
        .node-content.active { background: #e74c3c; font-weight: bold; }
        
        .drag-handle { cursor: grab; margin-right: 10px; color: #7f8c8d; font-size: 18px; }
        .drag-handle:active { cursor: grabbing; }
        .node-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        
        .actions { display: none; }
        .node-content:hover .actions { display: flex; gap: 8px; }
        .actions button { background: none; border: none; font-size: 14px; cursor: pointer; padding: 0; line-height: 1; filter: grayscale(1); transition: all 0.2s; }
        .actions button:hover { transform: scale(1.2); filter: grayscale(0); }
        
        .editor-container { flex: 1; height: 100vh; width: 100%; border: none; background: #fff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <header>
            <h2>Pages & Templates</h2>
            <input type="text" id="searchBox" class="search-box" placeholder="Search pages..." oninput="filterTree()">
        </header>
        <div class="tree-container">
            <ul id="fileTree" class="tree-root"></ul>
        </div>
    </div>
    <iframe name="editorFrame" class="editor-container" src="" id="editorFrame"></iframe>

    <div id="modalOverlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center; font-family:sans-serif;">
        <div style="background:#fff; padding:25px; border-radius:8px; width:350px; box-shadow:0 5px 15px rgba(0,0,0,0.3);">
            <h3 id="modalTitle" style="margin:0 0 15px 0; color:#2c3e50; font-size:16px;"></h3>
            <input type="text" id="modalInput" style="width:100%; padding:10px; margin-bottom:20px; box-sizing:border-box; border:1px solid #bdc3c7; border-radius:4px; font-size:14px; outline:none;">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button id="modalCancel" style="padding:10px 15px; border:none; background:#ecf0f1; color:#7f8c8d; border-radius:4px; cursor:pointer;">Cancel</button>
                <button id="modalConfirm" style="padding:10px 15px; border:none; background:#e74c3c; color:#fff; border-radius:4px; cursor:pointer;">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let treeData = [];
        let draggedItem = null;
        let activeFile = null;

        function showModal(title, showInput, defaultValue, callback) {
            const overlay = document.getElementById('modalOverlay');
            document.getElementById('modalTitle').textContent = title;
            const input = document.getElementById('modalInput');
            const btnCancel = document.getElementById('modalCancel');
            const btnConfirm = document.getElementById('modalConfirm');
            
            btnCancel.style.display = 'block';
            btnConfirm.textContent = 'Confirm';
            
            if (showInput) {
                input.style.display = 'block';
                input.value = defaultValue;
                input.focus();
            } else {
                input.style.display = 'none';
            }
            overlay.style.display = 'flex';
            
            btnConfirm.onclick = () => { overlay.style.display = 'none'; callback(true, input.value); };
            btnCancel.onclick = () => { overlay.style.display = 'none'; callback(false, null); };
        }

        function customAlert(msg) {
            showModal(msg, false, '', (c) => {});
            document.getElementById('modalCancel').style.display = 'none';
            document.getElementById('modalConfirm').textContent = 'OK';
        }

        async function init() {
            try {
                const res = await fetch('http://localhost:56948/api/editor/files');
                treeData = await res.json();
                renderAll();
                if (treeData.length > 0) openFile(treeData[0].id);
            } catch (err) {
                document.getElementById('fileTree').innerHTML = '<li style="padding: 20px; color: #e74c3c; text-align:center;">Failed to load data. Is the backend server running?</li>';
            }
        }

        function renderAll() {
            const root = document.getElementById('fileTree');
            renderNodes(treeData, root);
        }

        function renderNodes(nodes, parentEl) {
            parentEl.innerHTML = '';
            nodes.forEach(node => {
                const li = document.createElement('li');
                li.className = 'tree-node';
                li.dataset.nodeId = node.id;
                
                const nodeContent = document.createElement('div');
                nodeContent.className = 'node-content' + (activeFile === node.id ? ' active' : '');
                
                nodeContent.innerHTML = `
                    <span class="drag-handle" draggable="true" title="Drag to move">☰</span>
                    <span class="node-name" onclick="openFile('${node.id}')">${node.text}</span>
                    <div class="actions">
                        <button onclick="renameFile('${node.id}')" title="Rename file">✏️</button>
                        <button onclick="duplicateFile('${node.id}')" title="Duplicate file">📄</button>
                        <button onclick="deleteFile('${node.id}')" title="Delete file">❌</button>
                    </div>
                `;
                
                const handle = nodeContent.querySelector('.drag-handle');
                handle.ondragstart = (e) => { 
                    draggedItem = node; 
                    e.dataTransfer.effectAllowed = 'move'; 
                    e.dataTransfer.setData('text/plain', node.id); 
                };

                nodeContent.ondragover = (e) => { 
                    e.preventDefault(); 
                    const rect = nodeContent.getBoundingClientRect();
                    const relativeY = e.clientY - rect.top;
                    nodeContent.classList.remove('drag-over', 'drag-above', 'drag-below');
                    if (relativeY < rect.height * 0.25) {
                        nodeContent.classList.add('drag-above');
                    } else if (relativeY > rect.height * 0.75) {
                        nodeContent.classList.add('drag-below');
                    } else {
                        nodeContent.classList.add('drag-over');
                    }
                };
                nodeContent.ondragleave = (e) => { nodeContent.classList.remove('drag-over', 'drag-above', 'drag-below'); };
                nodeContent.ondrop = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const isAbove = nodeContent.classList.contains('drag-above');
                    const isBelow = nodeContent.classList.contains('drag-below');
                    nodeContent.classList.remove('drag-over', 'drag-above', 'drag-below');
                    
                    if (draggedItem && draggedItem.id !== node.id) {
                        let position = 'inside';
                        if (isAbove) position = 'before';
                        if (isBelow) position = 'after';
                        
                        moveNode(treeData, draggedItem.id, node.id, position);
                        saveTree();
                        renderAll();
                    }
                };

                li.appendChild(nodeContent);
                
                const childrenUl = document.createElement('ul');
                childrenUl.className = 'children';
                li.appendChild(childrenUl);
                
                if (node.children && node.children.length > 0) {
                    renderNodes(node.children, childrenUl);
                }
                
                parentEl.appendChild(li);
            });
            
            if (parentEl.id === 'fileTree') {
                const container = document.querySelector('.tree-container');
                container.ondragover = (e) => e.preventDefault();
                container.ondrop = (e) => {
                    e.preventDefault();
                    if (draggedItem) {
                        const isTop = e.clientY < 180;
                        moveNode(treeData, draggedItem.id, null, isTop ? 'top' : 'bottom');
                        saveTree();
                        renderAll();
                    }
                };
            }
        }

        function moveNode(tree, draggedId, targetId, position = 'inside') {
            let extracted = removeNode(tree, draggedId);
            if (!extracted) return;
            
            if (targetId === null) {
                if (position === 'top') {
                    // Prepend to top
                    tree.unshift(extracted);
                } else {
                    tree.push(extracted);
                }
            } else {
                insertNodePosition(tree, targetId, extracted, position);
            }
        }

        function removeNode(nodes, id) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === id) { return nodes.splice(i, 1)[0]; }
                if (nodes[i].children) {
                    let result = removeNode(nodes[i].children, id);
                    if (result) return result;
                }
            }
            return null;
        }

        function insertNodePosition(nodes, targetId, movingNode, position) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === targetId) {
                    if (position === 'inside') {
                        nodes[i].children = nodes[i].children || [];
                        nodes[i].children.push(movingNode);
                    } else if (position === 'before') {
                        nodes.splice(i, 0, movingNode);
                    } else if (position === 'after') {
                        nodes.splice(i + 1, 0, movingNode);
                    }
                    return true;
                }
                if (nodes[i].children) {
                    if (insertNodePosition(nodes[i].children, targetId, movingNode, position)) return true;
                }
            }
            return false;
        }

        async function saveTree() {
            await fetch('http://localhost:56948/api/editor/tree', {
                method: 'POST',
                body: JSON.stringify(treeData),
                headers: { 'Content-Type': 'application/json' }
            });
        }

        function openFile(id) {
            activeFile = id;
            document.getElementById('editorFrame').src = 'grapesjs.html?file=' + encodeURIComponent(id);
            renderAll();
        }

        function renameFile(id) {
            showModal('Enter new file name:', true, id, async (confirmed, newName) => {
                if (!confirmed || !newName || newName === id) return;
                if (!newName.toLowerCase().endsWith('.html')) newName += '.html';
                
                const res = await fetch('http://localhost:56948/api/editor/files/rename', {
                    method: 'POST',
                    body: JSON.stringify({ oldName: id, newName: newName }),
                    headers: { 'Content-Type': 'application/json' }
                });
                if (res.ok) {
                    renameInTree(treeData, id, newName);
                    saveTree();
                    renderAll();
                    if (activeFile === id) openFile(newName);
                } else customAlert('Failed to rename file.');
            });
        }

        function renameInTree(nodes, id, newName) {
            for (let n of nodes) {
                if (n.id === id) { n.id = newName; n.text = newName; return true; }
                if (n.children) renameInTree(n.children, id, newName);
            }
        }

        async function duplicateFile(id) {
            const res = await fetch('http://localhost:56948/api/editor/files/duplicate', {
                method: 'POST',
                body: JSON.stringify({ file: id }),
                headers: { 'Content-Type': 'application/json' }
            });
            if (res.ok) {
                const data = await res.json();
                const newNode = { id: data.newFile, text: data.newFile, children: [] };
                addAfter(treeData, id, newNode);
                saveTree();
                renderAll();
            } else customAlert('Failed to duplicate file.');
        }

        function addAfter(nodes, id, newNode) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === id) { nodes.splice(i + 1, 0, newNode); return true; }
                if (nodes[i].children && addAfter(nodes[i].children, id, newNode)) return true;
            }
            return false;
        }

        function deleteFile(id) {
            showModal(`Are you extremely sure you want to permanently delete '${id}'?`, false, '', async (confirmed) => {
                if (!confirmed) return;
                const res = await fetch('http://localhost:56948/api/editor/files?file=' + encodeURIComponent(id), { method: 'DELETE' });
                if (res.ok) {
                    removeNode(treeData, id);
                    saveTree();
                    renderAll();
                    if (activeFile === id) document.getElementById('editorFrame').src = '';
                } else customAlert('Failed to delete file.');
            });
        }

        function filterTree() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('.tree-node').forEach(li => {
                const content = li.querySelector('.node-content');
                const name = content.querySelector('.node-name').textContent.toLowerCase();
                
                // Show if it matches search, OR if search is empty
                if (name.includes(term)) {
                    li.style.display = '';
                    // Need to also show all parents so nested ones are visible
                    let parentUl = li.parentElement;
                    while(parentUl && parentUl.classList.contains('children')) {
                        parentUl.parentElement.style.display = '';
                        parentUl = parentUl.parentElement.parentElement;
                    }
                } else {
                    li.style.display = 'none';
                }
            });
            
            // Re-show all if query empty
            if (term.length === 0) {
                document.querySelectorAll('.tree-node').forEach(li => li.style.display = '');
            }
        }

        init();
    </script>
</body>
</html>
